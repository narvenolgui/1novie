<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дерево моих интересов</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: #f5f0e8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            max-width: 800px;
            text-align: center;
        }
        .btn-print {
            background: #6b8e23;
            color: white;
            border: none;
            border-radius: 30px;
            padding: 12px 35px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
            transition: background 0.3s;
            letter-spacing: 1px;
        }
        .btn-print:hover {
            background: #556b2f;
        }
        .tree-svg {
            width: 100%;
            height: auto;
        }
        /* Стили для печати */
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .btn-print {
                display: none;
            }
            .container {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <!-- Кнопка печати -->
    <button class="btn-print" onclick="window.print()">🖨️ Распечатать / Сохранить PDF</button>

    <!-- SVG-рисунок дерева -->
    <svg class="tree-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">
        <!-- Фон -->
        <rect width="800" height="800" fill="#fef9e4" rx="20" ry="20" stroke="#d4b483" stroke-width="4"/>

        <!-- Трава -->
        <ellipse cx="400" cy="720" rx="350" ry="40" fill="#7c9f58" opacity="0.7"/>
        <ellipse cx="400" cy="730" rx="300" ry="30" fill="#8db255" opacity="0.8"/>

        <!-- Корни -->
        <path d="M400 620 Q350 680 280 700" fill="none" stroke="#5d3a1a" stroke-width="12" stroke-linecap="round"/>
        <path d="M400 620 Q380 690 360 720" fill="none" stroke="#5d3a1a" stroke-width="10" stroke-linecap="round"/>
        <path d="M400 620 Q420 690 440 720" fill="none" stroke="#5d3a1a" stroke-width="10" stroke-linecap="round"/>
        <path d="M400 620 Q460 680 520 700" fill="none" stroke="#5d3a1a" stroke-width="12" stroke-linecap="round"/>

        <!-- Ствол -->
        <path d="M400 620 L400 440" fill="none" stroke="#6b3a1f" stroke-width="22" stroke-linecap="round"/>
        <path d="M390 620 L390 440" fill="none" stroke="#7a4b2a" stroke-width="10" stroke-linecap="round"/>

        <!-- Ветви (основные ответвления) -->
        <!-- Левая нижняя ветвь -->
        <path d="M395 540 Q320 500 260 440" fill="none" stroke="#5d3a1a" stroke-width="10" stroke-linecap="round"/>
        <!-- Левая средняя ветвь -->
        <path d="M395 490 Q300 430 220 350" fill="none" stroke="#5d3a1a" stroke-width="9" stroke-linecap="round"/>
        <!-- Левая верхняя ветвь -->
        <path d="M395 460 Q330 380 280 280" fill="none" stroke="#5d3a1a" stroke-width="8" stroke-linecap="round"/>

        <!-- Правая нижняя ветвь -->
        <path d="M405 540 Q480 500 540 430" fill="none" stroke="#5d3a1a" stroke-width="10" stroke-linecap="round"/>
        <!-- Правая средняя ветвь -->
        <path d="M405 490 Q500 430 580 340" fill="none" stroke="#5d3a1a" stroke-width="9" stroke-linecap="round"/>
        <!-- Правая верхняя ветвь -->
        <path d="M405 460 Q480 370 520 270" fill="none" stroke="#5d3a1a" stroke-width="8" stroke-linecap="round"/>

        <!-- Верхняя центральная ветвь -->
        <path d="M400 450 Q400 380 400 300" fill="none" stroke="#5d3a1a" stroke-width="8" stroke-linecap="round"/>

        <!-- Мелкие ветки и листва (группы листьев) -->
        <!-- Левая сторона -->
        <ellipse cx="250" cy="430" rx="50" ry="35" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="240" cy="440" rx="40" ry="30" fill="#3c6b1f" opacity="0.8"/>
        <ellipse cx="210" cy="340" rx="55" ry="40" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="200" cy="350" rx="45" ry="35" fill="#5a8f3a" opacity="0.8"/>
        <ellipse cx="270" cy="270" rx="50" ry="35" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="280" cy="280" rx="40" ry="30" fill="#3c6b1f" opacity="0.8"/>
        <!-- Правая сторона -->
        <ellipse cx="550" cy="420" rx="50" ry="35" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="560" cy="430" rx="40" ry="30" fill="#3c6b1f" opacity="0.8"/>
        <ellipse cx="590" cy="330" rx="55" ry="40" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="600" cy="340" rx="45" ry="35" fill="#5a8f3a" opacity="0.8"/>
        <ellipse cx="530" cy="260" rx="50" ry="35" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="520" cy="270" rx="40" ry="30" fill="#3c6b1f" opacity="0.8"/>
        <!-- Верхушка -->
        <ellipse cx="400" cy="280" rx="60" ry="45" fill="#4a7c2e" opacity="0.9"/>
        <ellipse cx="400" cy="290" rx="50" ry="40" fill="#5a8f3a" opacity="0.8"/>

        <!-- Декоративные листики (маленькие) вокруг ветвей -->
        <circle cx="280" cy="450" r="8" fill="#6aa84f"/>
        <circle cx="230" cy="400" r="7" fill="#8dc63f"/>
        <circle cx="320" cy="460" r="6" fill="#6aa84f"/>
        <circle cx="200" cy="310" r="8" fill="#8dc63f"/>
        <circle cx="250" cy="250" r="7" fill="#6aa84f"/>
        <circle cx="520" cy="440" r="8" fill="#6aa84f"/>
        <circle cx="570" cy="390" r="7" fill="#8dc63f"/>
        <circle cx="480" cy="460" r="6" fill="#6aa84f"/>
        <circle cx="600" cy="300" r="8" fill="#8dc63f"/>
        <circle cx="550" cy="240" r="7" fill="#6aa84f"/>

        <!-- Подписи на ветвях (предметы) -->
        <!-- Каждая подпись расположена рядом с соответствующей ветвью -->
        <text x="180" y="415" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(-15, 180, 415)">Математика</text>
        <text x="150" y="320" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(-25, 150, 320)">Русский язык</text>
        <text x="230" y="240" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(-10, 230, 240)">Чтение</text>

        <text x="560" y="405" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(15, 560, 405)">Окружающий мир</text>
        <text x="610" y="305" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(25, 610, 305)">Физкультура</text>
        <text x="540" y="230" font-size="20" font-weight="bold" fill="#2d1e0f" transform="rotate(10, 540, 230)">Музыка</text>

        <text x="370" y="260" font-size="20" font-weight="bold" fill="#2d1e0f" text-anchor="middle">Технология</text>
        <text x="430" y="310" font-size="20" font-weight="bold" fill="#2d1e0f" text-anchor="middle">ИЗО</text>

        <!-- Надпись "Мои интересы" на корнях -->
        <text x="400" y="760" font-size="24" font-weight="bold" fill="#3e2213" text-anchor="middle" letter-spacing="1">Мои интересы</text>

        <!-- Имя в стволе -->
        <text x="400" y="555" font-size="22" font-weight="bold" fill="#f5f0e0" text-anchor="middle" letter-spacing="2">ИМЯ</text>

        <!-- Заголовок -->
        <text x="400" y="45" font-size="28" font-weight="bold" fill="#4a3b1f" text-anchor="middle" font-family="'Comic Sans MS', cursive, sans-serif">Дерево моих интересов</text>
    </svg>
</div>
</body>
</html>
